#!name=补充配置
#!desc=补充配置

[General]
skip-proxy = iosapps.itunes.apple.com
force-http-engine-hosts = boxjs.com, boxjs.net, *.boxjs.com, *.boxjs.net, script.hub, *.script.hub

[Rule]
# 📍 Country Code & Amap Dispatcher
DOMAIN,gspe1-ssl.ls.apple.com,DIRECT
DOMAIN,dispatcher.is.autonavi.com,DIRECT
DOMAIN-SUFFIX,is.autonavi.com,DIRECT

# 📰 AppleNews
RULE-SET,https://github.com/NSRingo/News/releases/download/v3.2.1/News.list,Proxy
RULE-SET,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Shadowrocket/AppleNews/AppleNews.list,Proxy

# 🗺️ Maps
DOMAIN,gspe11-2-cn-ssl.ls.apple.com,DIRECT
DOMAIN,gspe12-cn-ssl.ls.apple.com,DIRECT
DOMAIN,gspe19-cn-ssl.ls.apple.com,DIRECT
DOMAIN,gspe19-2-cn-ssl.ls.apple.com,DIRECT
DOMAIN,gspe79-cn-ssl.ls.apple.com,DIRECT

# ☁️ iCloud
DOMAIN,gateway.icloud.com,Proxy

# 🌤 WeatherKit
DOMAIN,weather-analytics-events.apple.com,REJECT-DROP
DOMAIN-SUFFIX,tthr.apple.com,REJECT-DROP
DOMAIN,tether.edge.apple,REJECT-DROP
AND,((OR,((IP-ASN,714,no-resolve),(IP-ASN,6185,no-resolve))),(PROTOCOL,QUIC)),REJECT-DROP
DOMAIN,known-issues.apple.com,REJECT-DROP

# 🛍 AppStore
RULE-SET,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Shadowrocket/AppStore/AppStore.list,DIRECT

# AppleTV
^https?:\/\/play-cdn\.itunes\.apple\.com https://play.itunes.apple.com header
^https?:\/\/play-edge-cdn\.itunes\.apple\.com https://play-edge.itunes.apple.com header

# 📺 YouTube
AND,((DOMAIN-SUFFIX,googlevideo.com),(PROTOCOL,UDP)),REJECT
AND,((DOMAIN,youtubei.googleapis.com),(PROTOCOL,UDP)),REJECT

# 🎵 TikTok解锁
RULE-SET,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Shadowrocket/TikTok/TikTok.list,Proxy

[URL Rewrite]

# Youtube 播放页广告
^https:\/\/[\w-]+\.googlevideo\.com\/initplayback\?.+&oad - reject-dict
# ======= 通用广告请求 ======= #
^https?:\/\/(www|s)\.youtube\.com\/api\/stats\/ads - reject-200
^https?:\/\/(www|s)\.youtube\.com\/(pagead|ptracking) - reject-200
^https?:\/\/s\.youtube\.com\/api\/stats\/qoe\?adcontext - reject-200
# ======= 视频广告请求 ======= #
(^https?:\/\/[\w-]+\.googlevideo\.com\/(?!dclk_video_ads).+?)&ctier=L(&.+?),ctier,(.+) $1$2$3 302
^https?:\/\/[\w-]+\.googlevideo\.com\/(?!(dclk_video_ads|videoplayback\?)).+&oad - reject-200

# 解锁TikTok美國地区
(?<=_region=)CN(?=&) US 307
(?<=&mcc_mnc=)4 2 307
^(https?:\/\/(tnc|dm)[\w-]+\.\w+\.com\/.+)(\?)(.+) $1$3 302
(^https?:\/\/*\.\w{4}okv.com\/.+&.+)(\d{2}\.3\.\d)(.+) $118.0$3 302

[Script]
# 📍 Country Code
📍 LocationService.pep.gcc.response = type=http-response, pattern=^https?:\/\/gspe1-ssl\.ls\.apple\.com\/pep\/gcc, requires-body=true, script-path=https://github.com/NSRingo/LocationService/releases/download/v1.0.1/response.bundle.js, argument=GeoCountryCode=US&Dispatcher.Hybrid=false&LogLevel=0
# 📍 Dispatcher
📍 LocationService.Dispatcher.request = type=http-request, pattern=^https?:\/\/dispatcher\.is\.autonavi\.com\/dispatcher, requires-body=true, script-path=https://github.com/NSRingo/LocationService/releases/download/v1.0.1/request.bundle.js, argument=GeoCountryCode=US&Dispatcher.Hybrid=false&LogLevel=0
📍 LocationService.Dispatcher.response = type=http-response, pattern=^https?:\/\/dispatcher\.is\.autonavi\.com\/dispatcher, requires-body=true, script-path=https://github.com/NSRingo/LocationService/releases/download/v1.0.1/response.bundle.js, argument=GeoCountryCode=US&Dispatcher.Hybrid=false&LogLevel=0

# 🗺️ Network Defaults
🗺️ Maps.config.defaults.request = type=http-request, pattern=^https?:\/\/configuration\.ls\.apple\.com\/config\/defaults, script-path=https://github.com/NSRingo/GeoServices/releases/download/v4.5.1/request.bundle.js, argument=GeoManifest.Dynamic.Config.CountryCode=US&LogLevel=0
🗺️ Maps.config.defaults.response = type=http-response, pattern=^https?:\/\/configuration\.ls\.apple\.com\/config\/defaults, requires-body=true, script-path=https://github.com/NSRingo/GeoServices/releases/download/v4.5.1/response.bundle.js, argument=GeoManifest.Dynamic.Config.CountryCode=US&LogLevel=0
# 🗺️ Announcements
🗺️ Maps.config.announcements.request = type=http-request, pattern=^https?:\/\/gspe35-ssl\.ls\.apple\.(com|cn)\/config\/announcements, script-path=https://github.com/NSRingo/GeoServices/releases/download/v4.5.1/request.bundle.js, argument=GeoManifest.Dynamic.Config.CountryCode=US&LogLevel=0
🗺️ Maps.config.announcements.response = type=http-response, pattern=^https?:\/\/gspe35-ssl\.ls\.apple\.(com|cn)\/config\/announcements, requires-body=true, script-path=https://github.com/NSRingo/GeoServices/releases/download/v4.5.1/response.bundle.js, argument=GeoManifest.Dynamic.Config.CountryCode=US&LogLevel=0
# 🗺️ Resource Manifest
🗺️ Maps.geo_manifest.dynamic.config.request = type=http-request, pattern=^https?:\/\/gspe35-ssl\.ls\.apple\.(com|cn)\/geo_manifest\/dynamic\/config, script-path=https://github.com/NSRingo/GeoServices/releases/download/v4.5.1/request.bundle.js, argument=GeoManifest.Dynamic.Config.CountryCode=US&LogLevel=0
🗺️ Maps.geo_manifest.dynamic.config.response = type=http-response, pattern=^https?:\/\/gspe35-ssl\.ls\.apple\.(com|cn)\/geo_manifest\/dynamic\/config, requires-body=true, script-path=https://github.com/NSRingo/GeoServices/releases/download/v4.5.1/response.bundle.js, argument=GeoManifest.Dynamic.Config.CountryCode=US&LogLevel=0

# AppleTV
📺 TV.uts.request = type=http-request, pattern=^https?:\/\/uts-api\.itunes\.apple\.com\/uts\/(v1|v2|v3)\/, requires-body=true, script-path=https://github.com/NSRingo/TV/releases/download/v3.4.4/request.bundle.js, argument=ThirdParty=false&isWorkaroundSSLPinning=false&LogLevel=0
📺 TV.uts.response = type=http-response, pattern=^https?:\/\/uts-api\.itunes\.apple\.com\/uts\/(v1|v2|v3)\/, requires-body=true, script-path=https://github.com/NSRingo/TV/releases/download/v3.4.4/response.bundle.js, argument=ThirdParty=false&isWorkaroundSSLPinning=false&LogLevel=0
📺 TV.umc.request = type=http-request, pattern=^https?:\/\/umc-tempo-api\.apple\.com\/(v1|v2|v3)\/, requires-body=true, script-path=https://github.com/NSRingo/TV/releases/download/v3.4.4/request.bundle.js

# News
📰 News.v1.configs.request = type=http-request, pattern=^https?:\/\/news(-todayconfig)?-edge\.apple\.com\/v1\/configs, requires-body=true, script-path=https://github.com/NSRingo/News/releases/download/v3.2.1/request.bundle.js, argument=CountryCode=US&NewsPlusUser=false&LogLevel=0
📰 News.analyticseventsv2.async.request = type=http-request, pattern=^https?:\/\/news(-sports)?-events\.apple\.com\/analyticseventsv2\/async, requires-body=true, script-path=https://github.com/NSRingo/News/releases/download/v3.2.1/request.bundle.js, argument=CountryCode=US&NewsPlusUser=false&LogLevel=0
📰 News.v1.search.request = type=http-request, pattern=^https?:\/\/news-client-search\.apple\.com\/v1\/search, requires-body=true, script-path=https://github.com/NSRingo/News/releases/download/v3.2.1/request.bundle.js, argument=CountryCode=US&NewsPlusUser=false&LogLevel=0

# WeatherKit (彩云数据源)
🌤 WeatherKit.api.v1.availability.response = type=http-response, pattern=^https?:\/\/weatherkit\.apple\.com\/api\/v1\/availability\/, requires-body=true, script-path=https://github.com/NSRingo/WeatherKit/releases/download/v3.1.0/response.bundle.js, argument=Weather.Provider=ColorfulClouds&NextHour.Provider=ColorfulClouds&AirQuality.Provider=ColorfulClouds&AirQuality.Replace.Provider=QWeather&AirQuality.Compare.Provider=Auto&AirQuality.Local.Algorithm=NONE&AirQuality.Modify.Standard=HJ6332012&AirQuality.Convert.Unit=false&LogLevel=0
🌤 WeatherKit.api.v2.weather.response = type=http-response, pattern=^https?:\/\/weatherkit\.apple\.com\/api\/v2\/weather\/, requires-body=true, script-path=https://github.com/NSRingo/WeatherKit/releases/download/v3.1.0/response.bundle.js, argument=Weather.Provider=ColorfulClouds&NextHour.Provider=ColorfulClouds&AirQuality.Provider=ColorfulClouds&AirQuality.Replace.Provider=QWeather&AirQuality.Compare.Provider=Auto&AirQuality.Local.Algorithm=NONE&AirQuality.Modify.Standard=HJ6332012&AirQuality.Convert.Unit=false&LogLevel=0

# Script Hub
Script Hub: 前端 = type=http-request, pattern=^https?:\/\/script\.hub\/($|edit\/|reload), script-path=https://raw.githubusercontent.com/Script-Hub-Org/Script-Hub/main/script-hub.js
Script Hub: 重写转换 = type=http-request, pattern=^https?:\/\/script\.hub\/file\/_start_\/.+type=(?:qx-rewrite|surge-module|loon-plugin|all-module), script-path=https://raw.githubusercontent.com/Script-Hub-Org/Script-Hub/main/Rewrite-Parser.js
Script Hub: 规则集转换 = type=http-request, pattern=^https?:\/\/script\.hub\/file\/_start_\/.+type=rule-set, script-path=https://raw.githubusercontent.com/Script-Hub-Org/Script-Hub/main/rule-parser.js
Script Hub: 脚本转换 = type=http-request, pattern=^https?:\/\/script\.hub\/convert\/, script-path=https://raw.githubusercontent.com/Script-Hub-Org/Script-Hub/main/script-converter.js

# BoxJs
Rewrite: BoxJs = type=http-request, pattern=^https?:\/\/(.+\.)?boxjs\.(com|net), script-path=https://raw.githubusercontent.com/chavyleung/scripts/master/chavy.box.js, requires-body=true

[MITM]
enable = true
ca-passphrase = Shadowrocket
hostname =%APPEND% dispatcher.is.autonavi.com, gspe1-ssl.ls.apple.com, script.hub, *.script.hub, boxjs.com, boxjs.net, *.boxjs.com, *.boxjs.net, weatherkit.apple.com, *.smoot.apple.com, *.smoot.apple.cn, *.ls.apple.com, *.is.autonavi.com, news-edge.apple.com, news-todayconfig-edge.apple.com, news-events.apple.com, news-sports-events.apple.com, news-client-search.apple.com, uts-api.itunes.apple.com, play-edge-cdn.itunes.apple.com, play-cdn.itunes.apple.com, umc-tempo-api.apple.com, *.googlevideo.com, youtubei.googleapis.com, *.tiktokv.com, *.byteoversea.com, *.tik-tokapi.com